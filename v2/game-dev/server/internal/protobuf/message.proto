syntax = "proto3";

package barrage;

option go_package = "internal/protobuf";

// ========== 基础消息 ==========

message CSMessage {
    uint32 msg_id = 1;
    bytes data = 2;
}

message SCMessage {
    uint32 msg_id = 1;
    bytes data = 2;
}

// ========== 房间消息 ==========

message RoomInfo {
    string room_id = 1;
    string status = 2;
    repeated PlayerInfo players = 3;
    int64 created_at = 4;
}

message PlayerInfo {
    string id = 1;
    string name = 2;
    string team = 3;  // "blue" or "red"
    bool is_ready = 4;
}

message CreateRoomReq {
    string player_id = 1;
    string player_name = 2;
}

message CreateRoomResp {
    string room_id = 1;
    RoomInfo room = 2;
}

message JoinRoomReq {
    string room_id = 1;
    string player_id = 2;
    string player_name = 3;
}

message JoinRoomResp {
    RoomInfo room = 1;
    string team = 2;
}

message LeaveRoomReq {
    string room_id = 1;
    string player_id = 2;
}

// ========== 游戏消息 ==========

message GameStart {
    int32 game_id = 1;
    int64 start_time = 2;
    MapInfo map = 3;
}

message MapInfo {
    int32 width = 1;
    int32 height = 2;
    repeated TowerInfo towers = 3;
    repeated SpawnPoint spawns = 4;
}

message TowerInfo {
    string id = 1;
    string type = 2;  // "arrow", "cannon", "laser", "frost"
    int32 x = 3;
    int32 y = 4;
    int32 level = 5;
}

message SpawnPoint {
    string id = 1;
    string team = 2;
    int32 x = 3;
    int32 y = 4;
}

// ========== 同步消息 ==========

message GameState {
    int32 frame = 1;
    repeated EntityState entities = 2;
    ResourceState resources = 3;
}

message EntityState {
    string id = 1;
    string type = 2;  // "droid", "dinosaur", "tower", "base"
    string team = 3;
    int32 x = 4;
    int32 y = 5;
    int32 hp = 6;
    int32 max_hp = 7;
    string state = 8;  // "idle", "move", "attack", "die"
}

message ResourceState {
    int32 blue_gold = 1;
    int32 red_gold = 2;
    int32 blue_power = 3;
    int32 red_power = 4;
}

// ========== 玩家操作 ==========

message PlayerAction {
    string player_id = 1;
    ActionType type = 2;
    int32 x = 3;
    int32 y = 4;
    string target_id = 5;
    int32 timestamp = 6;
}

enum ActionType {
    BUILD_TOWER = 0;
    UPGRADE_TOWER = 1;
    SELL_TOWER = 2;
    SPAWN_DROID = 3;
    USE_SKILL = 4;
    SWITCH_VIEW = 5;
}

// ========== 游戏事件 ==========

message GameOver {
    string winner = 1;  // "blue" or "red"
    GameStats stats = 2;
}

message GameStats {
    int32 total_kills = 1;
    int32 total_damage = 2;
    int32 towers_built = 3;
    int32 droids_spawned = 4;
}

// ========== 心跳 ==========

message Heartbeat {
    int64 timestamp = 1;
    int32 ping = 2;
}
