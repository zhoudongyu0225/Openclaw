<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Openclaw 工作台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .header h1 {
            font-size: 24px;
            color: #333;
        }
        
        .header .time {
            color: #666;
            font-size: 14px;
        }
        
        /* 表格形式 */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        
        .card.working {
            border-color: #4CAF50;
        }
        
        .card.idle {
            border-color: #FF9800;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
        }
        
        .status.working {
            background: #E8F5E9;
            color: #4CAF50;
        }
        
        .status.idle {
            background: #FFF3E0;
            color: #FF9800;
        }
        
        .card-desc {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .card-stats {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #999;
        }
        
        .stat-value {
            color: #333;
            font-weight: 600;
        }
        
        /* 详情页 */
        .detail {
            display: none;
        }
        
        .detail.active {
            display: block;
        }
        
        .detail-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .back-btn {
            background: #333;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .back-btn:hover {
            background: #555;
        }
        
        .file-list {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .file-item {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .file-item:hover {
            background: #f9f9f9;
        }
        
        .file-item:last-child {
            border-bottom: none;
        }
        
        .file-icon {
            font-size: 20px;
        }
        
        .file-info {
            flex: 1;
        }
        
        .file-name {
            font-size: 14px;
            color: #333;
            margin-bottom: 2px;
        }
        
        .file-meta {
            font-size: 12px;
            color: #999;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 480px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Openclaw 工作台</h1>
        <div class="time" id="time"></div>
    </div>
    
    <div class="grid" id="grid">
        <!-- 卡片由JS生成 -->
    </div>
    
    <div class="detail" id="detail">
        <div class="detail-header">
            <button class="back-btn" onclick="showHome()">← 返回</button>
            <h2 id="detailTitle"></h2>
        </div>
        <div class="file-list" id="fileList"></div>
    </div>
    
    <script>
        const projects = [
            {
                id: 'content-ops',
                name: '🏥 眠心诊所',
                desc: '内容运营：公众号文章、抖音脚本、小红书笔记',
                status: 'working',
                progress: 90,
                files: 54,
                task: '撰写心理治疗科普文章'
            },
            {
                id: 'ecommerce',
                name: '🛒 氢美健康',
                desc: '电商运营：产品页、定价策略、用户案例',
                status: 'idle',
                progress: 40,
                files: 26,
                task: '完善产品页内容'
            },
            {
                id: 'game-dev',
                name: '🎮 弹幕游戏',
                desc: '游戏开发：Go服务器、Protobuf协议、数据库设计',
                status: 'working',
                progress: 75,
                files: 42,
                task: '开发战斗系统'
            },
            {
                id: 'ad-creative',
                name: '🎬 游戏广告',
                desc: '创意策划：买量脚本、爆款分析、广大大调研',
                status: 'idle',
                progress: 30,
                files: 26,
                task: '分析竞品素材'
            },
            {
                id: 'art-gen',
                name: '🎨 美术素材',
                desc: 'AI生成：提示词库、风格指南、UI设计',
                status: 'working',
                progress: 85,
                files: 13,
                task: '优化AI提示词'
            },
            {
                id: 'tech-support',
                name: '🔧 技术支持',
                desc: '工具开发：试玩HTML、部署脚本、性能优化',
                status: 'idle',
                progress: 50,
                files: 8,
                task: '优化加载速度'
            }
        ];
        
        const fileData = {
            'content-ops': [
                {name: 'company-info.md', meta: '公司调研 - 成都高新眠心诊所', icon: '📋'},
                {name: 'article-41.md', meta: '失眠自救指南 - 1500字', icon: '📄'},
                {name: 'article-42.md', meta: '为什么选择眠心 - 1200字', icon: '📄'},
                {name: 'article-43.md', meta: '心理治疗Q&A - 800字', icon: '📄'},
                {name: 'progress.md', meta: '进度报告', icon: '📊'}
            ],
            'ecommerce': [
                {name: 'product-detail.md', meta: '产品详情页 - 氢镁胶囊', icon: '📄'},
                {name: 'customer-cases.md', meta: '用户案例 - 3个真实故事', icon: '📄'},
                {name: 'index.html', meta: '产品页源码', icon: '🌐'}
            ],
            'game-dev': [
                {name: 'server/game.go', meta: '游戏服务器主程序 - 200行', icon: '💻'},
                {name: 'server/battle.go', meta: '战斗逻辑 - 150行', icon: '⚔️'},
                {name: 'server/matchmaking.go', meta: '匹配系统 - 100行', icon: '🔗'},
                {name: 'tech-plan.md', meta: '技术方案文档', icon: '📋'}
            ],
            'ad-creative': [
                {name: 'scripts-v17.md', meta: '买量脚本 - 5个完整版本', icon: '📝'},
                {name: 'case-analysis.md', meta: '爆款素材分析 - 10个案例', icon: '📊'},
                {name: 'creative-template.md', meta: '创意模板库', icon: '🎨'}
            ],
            'art-gen': [
                {name: 'ui-mockup.md', meta: 'UI设计稿 - 10个界面', icon: '🎨'},
                {name: 'icon-set.md', meta: '图标集 - 50+图标', icon: '🖼️'},
                {name: 'style-guide.md', meta: '风格指南 - 颜色/字体/间距', icon: '📋'}
            ],
            'tech-support': [
                {name: 'trial-game/', meta: '试玩HTML游戏 - 可运行', icon: '🎮'},
                {name: 'battle.js', meta: '战斗系统 - 300行', icon: '⚔️'},
                {name: 'deploy.sh', meta: '部署脚本 - 支持Vercel', icon: '🚀'}
            ]
        };
        
        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = projects.map(p => `
                <div class="card ${p.status}" onclick="showDetail('${p.id}')">
                    <div class="card-header">
                        <span class="card-title">${p.name}</span>
                        <span class="status ${p.status}">${p.status === 'working' ? '工作中' : '待命'}</span>
                    </div>
                    <div class="card-desc">${p.desc}</div>
                    <div class="card-stats">
                        <span>当前任务: <span class="stat-value">${p.task}</span></span>
                        <span>进度: <span class="stat-value">${p.progress}%</span></span>
                        <span>文件: <span class="stat-value">${p.files}</span></span>
                    </div>
                </div>
            `).join('');
        }
        
        function showDetail(id) {
            const p = projects.find(x => x.id === id);
            const files = fileData[id] || [];
            
            document.getElementById('grid').style.display = 'none';
            document.getElementById('detail').classList.add('active');
            document.getElementById('detailTitle').textContent = p.name + ' - 工作成果';
            document.getElementById('fileList').innerHTML = files.map(f => `
                <div class="file-item">
                    <span class="file-icon">${f.icon}</span>
                    <div class="file-info">
                        <div class="file-name">${f.name}</div>
                        <div class="file-meta">${f.meta}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function showHome() {
            document.getElementById('grid').style.display = 'grid';
            document.getElementById('detail').classList.remove('active');
        }
        
        function updateTime() {
            document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
        }
        
        renderGrid();
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
