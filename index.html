<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 Openclaw 办公室</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zcool+KuaiLe&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Zcool KuaiLe', cursive;
            background: linear-gradient(180deg, #a8e6cf 0%, #dcedc1 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 办公室场景 */
        .office {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            min-height: 100vh;
        }
        
        /* 办公室背景 */
        .room {
            background: linear-gradient(180deg, #fff9e6 0%, #f5e6d3 70%, #deb887 100%);
            border-radius: 30px;
            padding: 30px;
            min-height: 600px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 8px solid #8B4513;
        }
        
        /* 房间装饰 */
        .wall-pattern {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            height: 100px;
            background: repeating-linear-gradient(
                90deg,
                #FFDAB9,
                #FFDAB9 30px,
                #FFA07A 30px,
                #FFA07A 60px
            );
            border-radius: 20px;
            opacity: 0.3;
        }
        
        /* 办公桌 */
        .desk {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-top: 150px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        /* 角色卡片 */
        .worker {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
        }
        
        .worker:hover {
            transform: scale(1.1);
        }
        
        /* 角色形象 */
        .character {
            width: 100px;
            height: 120px;
            position: relative;
            margin-bottom: 10px;
        }
        
        /* 身体 */
        .body {
            width: 60px;
            height: 70px;
            background: #FF6B6B;
            border-radius: 30px 30px 20px 20px;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        
        /* 头 */
        .head {
            width: 50px;
            height: 50px;
            background: #FFE4B5;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border: 3px solid #333;
        }
        
        /* 眼睛 */
        .eyes {
            display: flex;
            gap: 8px;
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .eye {
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
        }
        
        /* 工作中动画 */
        .working .body {
            animation: work 0.5s infinite alternate;
        }
        
        @keyframes work {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }
        
        /* 工作中特效 */
        .working::after {
            content: '💪';
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 1.5rem;
            animation: sparkle 1s infinite;
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        /* 名字 */
        .name {
            background: #fff;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 1rem;
            border: 2px solid #333;
            margin-bottom: 5px;
        }
        
        /* 状态 */
        .status {
            font-size: 0.9rem;
            padding: 3px 10px;
            border-radius: 10px;
        }
        
        .status.working {
            background: #4CAF50;
            color: white;
        }
        
        .status.idle {
            background: #FFB74D;
            color: white;
        }
        
        /* 办公用品装饰 */
        .decor {
            position: absolute;
            font-size: 2rem;
        }
        
        .decor-1 { top: 30px; left: 30px; }
        .decor-2 { top: 30px; right: 30px; }
        .decor-3 { bottom: 30px; left: 30px; }
        .decor-4 { bottom: 30px; right: 30px; }
        
        /* 文件数量 */
        .files {
            position: absolute;
            bottom: -30px;
            background: #333;
            color: #fff;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
        }
        
        /* 标题 */
        h1 {
            text-align: center;
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #fff;
        }
        
        /* 二级页面 */
        .project-page {
            display: none;
        }
        
        .project-page.active {
            display: block;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #FF6B6B;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
        }
        
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        
        .file-card {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid #eee;
        }
        
        .file-card:hover {
            transform: translateY(-5px);
            border-color: #4CAF50;
        }
        
        .file-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .file-name {
            font-size: 0.9rem;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="office">
        <!-- 首页 -->
        <div class="home-page" id="homePage">
            <h1>🦞 Openclaw 办公室</h1>
            
            <div class="room">
                <div class="wall-pattern"></div>
                <div class="decor decor-1">🪴</div>
                <div class="decor decor-2">🕰️</div>
                <div class="decor decor-3">📺</div>
                <div class="decor decor-4">☕</div>
                
                <div class="desk">
                    <!-- 虾总 -->
                    <div class="worker" onclick="showProject('lobster')">
                        <div class="character working">
                            <div class="head">
                                <div class="eyes">
                                    <div class="eye"></div>
                                    <div class="eye"></div>
                                </div>
                            </div>
                            <div class="body" style="background: #FF6B6B;"></div>
                        </div>
                        <div class="name">🦞 虾总</div>
                        <div class="status working">工作中</div>
                    </div>
                    
                    <!-- 眠心诊所 -->
                    <div class="worker" onclick="showProject('content-ops')">
                        <div class="character working">
                            <div class="head">
                                <div class="eyes">
                                    <div class="eye"></div>
                                    <div class="eye"></div>
                                </div>
                            </div>
                            <div class="body" style="background: #4CAF50;"></div>
                        </div>
                        <div class="name">🏥 眠心</div>
                        <div class="status working">工作中</div>
                        <div class="files">54文件</div>
                    </div>
                    
                    <!-- 氢美健康 -->
                    <div class="worker" onclick="showProject('ecommerce')">
                        <div class="character idle">
                            <div class="head">
                                <div class="eyes">
                                    <div class="eye"></div>
                                    <div class="eye"></div>
                                </div>
                            </div>
                            <div class="body" style="background: #2196F3;"></div>
                        </div>
                        <div class="name">🛒 氢美</div>
                        <div class="status idle">学习中</div>
                        <div class="files">26文件</div>
                    </div>
                    
                    <!-- 弹幕游戏 -->
                    <div class="worker" onclick="showProject('game-dev')">
                        <div class="character working">
                            <div class="head">
                                <div class="eyes">
                                    <div class="eye"></div>
                                    <div class="eye"></div>
                                </div>
                            </div>
                            <div class="body" style="background: #9C27B0;"></div>
                        </div>
                        <div class="name">🎮 弹幕</div>
                        <div class="status working">工作中</div>
                        <div class="files">42文件</div>
                    </div>
                    
                    <!-- 游戏广告 -->
                    <div class="worker" onclick="showProject('ad-creative')">
                        <div class="character idle">
                            <div class="head">
                                <div class="eyes">
                                    <div class="eye"></div>
                                    <div class="eye"></div>
                                </div>
                            </div>
                            <div class="body" style="background: #FF9800;"></div>
                        </div>
                        <div class="name">🎬 广告</div>
                        <div class="status idle">待命中</div>
                        <div class="files">26文件</div>
                    </div>
                    
                    <!-- 美术素材 -->
                    <div class="worker" onclick="showProject('art-gen')">
                        <div class="character working">
                            <div class="head">
                                <div class="eyes">
                                    <div class="eye"></div>
                                    <div class="eye"></div>
                                </div>
                            </div>
                            <div class="body" style="background: #E91E63;"></div>
                        </div>
                        <div class="name">🎨 美术</div>
                        <div class="status working">工作中</div>
                        <div class="files">13文件</div>
                    </div>
                    
                    <!-- 技术支持 -->
                    <div class="worker" onclick="showProject('tech-support')">
                        <div class="character idle">
                            <div class="head">
                                <div class="eyes">
                                    <div class="eye"></div>
                                    <div class="eye"></div>
                                </div>
                            </div>
                            <div class="body" style="background: #607D8B;"></div>
                        </div>
                        <div class="name">🔧 技术</div>
                        <div class="status idle">待命中</div>
                        <div class="files">8文件</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 项目详情页 -->
        <div class="project-page" id="projectPage">
            <button class="back-btn" onclick="showHome()">← 返回办公室</button>
            <h1 id="projectTitle">项目</h1>
            <div class="file-grid" id="fileGrid"></div>
        </div>
    </div>
    
    <script>
        const projects = {
            'content-ops': { title: '🏥 眠心诊所', icon: '📄', files: ['article-41.md', 'article-42.md', 'company-info.md', 'README.md'] },
            'ecommerce': { title: '🛒 氢美健康', icon: '📄', files: ['product-detail.md', 'index.html', 'README.md'] },
            'game-dev': { title: '🎮 弹幕游戏', icon: '📄', files: ['game.go', 'server/', 'README.md'] },
            'ad-creative': { title: '🎬 游戏广告', icon: '📄', files: ['scripts-v17.md', 'creative-template.md', 'README.md'] },
            'art-gen': { title: '🎨 美术素材', icon: '📄', files: ['ui-mockup.md', 'ai-prompts.md', 'README.md'] },
            'tech-support': { title: '🔧 技术支持', icon: '📄', files: ['battle.js', 'deploy.sh', 'README.md'] }
        };
        
        function showProject(key) {
            const p = projects[key];
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('projectPage').classList.add('active');
            document.getElementById('projectTitle').textContent = p.title;
            
            const grid = document.getElementById('fileGrid');
            grid.innerHTML = p.files.map(f => `
                <div class="file-card">
                    <div class="file-icon">${p.icon}</div>
                    <div class="file-name">${f}</div>
                </div>
            `).join('');
        }
        
        function showHome() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('projectPage').classList.remove('active');
        }
    </script>
</body>
</html>
