<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 Openclaw 宝可梦训练师营地</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #98FB98 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        h1 {
            text-align: center;
            color: #fff;
            text-shadow: 3px 3px 0 #000;
            font-size: 2rem;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* 训练场 */
        .field {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }
        
        /* 精灵球卡片 */
        .pokemon-card {
            background: linear-gradient(145deg, #fff 0%, #f0f0f0 100%);
            border: 4px solid #333;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            width: 150px;
            box-shadow: 0 8px 0 #1a1a1a;
        }
        
        .pokemon-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 0 #1a1a1a;
        }
        
        .pokemon-card.working {
            border-color: #4CAF50;
        }
        
        .pokemon-card.idle {
            border-color: #FF9800;
        }
        
        /* 精灵图片 */
        .sprite {
            width: 100px;
            height: 100px;
            margin: 0 auto 10px;
            image-rendering: pixelated;
            animation: idleBounce 2s ease-in-out infinite;
        }
        
        .working .sprite {
            animation: workingBounce 0.5s ease-in-out infinite;
        }
        
        @keyframes idleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        @keyframes workingBounce {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.05) translateY(-8px); }
        }
        
        /* 名字 */
        .name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        /* 状态 */
        .status {
            font-size: 0.8rem;
            padding: 3px 10px;
            border-radius: 10px;
            display: inline-block;
        }
        
        .status.working { background: #4CAF50; color: #fff; }
        .status.idle { background: #FF9800; color: #fff; }
        
        /* HP条 */
        .hp-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin-top: 8px;
            border: 2px solid #333;
            overflow: hidden;
        }
        
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.5s;
        }
        
        /* 二级页面 */
        .detail-page { display: none; }
        .detail-page.active { display: block; }
        
        .back-btn {
            background: #FF6B6B;
            color: #fff;
            border: 3px solid #333;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #1a1a1a;
            margin-bottom: 20px;
        }
        
        .back-btn:hover { transform: translateY(-2px); }
        
        .detail-title {
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 20px;
            text-align: center;
        }
        
        /* 文件列表 */
        .file-list {
            background: #fff;
            border: 4px solid #333;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 8px 0 #1a1a1a;
        }
        
        .file-item {
            padding: 12px;
            border-bottom: 2px dashed #ddd;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.3s;
        }
        
        .file-item:hover { background: #f5f5f5; }
        .file-item:last-child { border-bottom: none; }
        
        .file-icon { font-size: 1.5rem; }
        .file-name { color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div class="home-page" id="homePage">
            <h1>🦞 Openclaw 宝可梦训练师营地</h1>
            
            <div class="field">
                <!-- 妙蛙种子 - 眠心 -->
                <div class="pokemon-card working" onclick="showDetail('content-ops')">
                    <img src="p1.png" class="sprite" alt="妙蛙种子">
                    <div class="name">🏥 眠心</div>
                    <div class="status working">工作中</div>
                    <div class="hp-bar"><div class="hp-fill" style="width: 90%"></div></div>
                </div>
                
                <!-- 小火龙 - 氢美 -->
                <div class="pokemon-card idle" onclick="showDetail('ecommerce')">
                    <img src="p2.png" class="sprite" alt="小火龙">
                    <div class="name">🛒 氢美</div>
                    <div class="status idle">学习中</div>
                    <div class="hp-bar"><div class="hp-fill" style="width: 40%"></div></div>
                </div>
                
                <!-- 杰尼龟 - 弹幕 -->
                <div class="pokemon-card working" onclick="showDetail('game-dev')">
                    <img src="p3.png" class="sprite" alt="杰尼龟">
                    <div class="name">🎮 弹幕</div>
                    <div class="status working">工作中</div>
                    <div class="hp-bar"><div class="hp-fill" style="width: 75%"></div></div>
                </div>
                
                <!-- 皮卡丘 - 广告 -->
                <div class="pokemon-card idle" onclick="showDetail('ad-creative')">
                    <img src="p4.png" class="sprite" alt="皮卡丘">
                    <div class="name">🎬 广告</div>
                    <div class="status idle">待命中</div>
                    <div class="hp-bar"><div class="hp-fill" style="width: 30%"></div></div>
                </div>
                
                <!-- 波波 - 美术 -->
                <div class="pokemon-card working" onclick="showDetail('art-gen')">
                    <img src="p5.png" class="sprite" alt="波波">
                    <div class="name">🎨 美术</div>
                    <div class="status working">工作中</div>
                    <div class="hp-bar"><div class="hp-fill" style="width: 85%"></div></div>
                </div>
                
                <!-- 卡拉卡拉 - 技术 -->
                <div class="pokemon-card idle" onclick="showDetail('tech-support')">
                    <img src="p6.png" class="sprite" alt="卡拉卡拉">
                    <div class="name">🔧 技术</div>
                    <div class="status idle">待命中</div>
                    <div class="hp-bar"><div class="hp-fill" style="width: 50%"></div></div>
                </div>
            </div>
        </div>
        
        <!-- 详情页 -->
        <div class="detail-page" id="detailPage">
            <button class="back-btn" onclick="goBack()">← 返回营地</button>
            <h2 class="detail-title" id="detailTitle">项目详情</h2>
            <div class="file-list" id="fileList"></div>
        </div>
    </div>
    
    <script>
        const projectData = {
            'content-ops': {
                name: '🏥 眠心诊所',
                files: [
                    {name: 'article-41.md - 失眠自救指南', icon: '📄'},
                    {name: 'article-42.md - 为什么选择眠心', icon: '📄'},
                    {name: 'article-43.md - 心理治疗Q&A', icon: '📄'},
                    {name: 'company-info.md - 公司信息', icon: '📋'}
                ]
            },
            'ecommerce': {
                name: '🛒 氢美健康',
                files: [
                    {name: 'product-detail.md - 产品详情', icon: '📄'},
                    {name: 'customer-cases.md - 用户案例', icon: '📄'},
                    {name: 'index.html - 产品页', icon: '🌐'}
                ]
            },
            'game-dev': {
                name: '🎮 弹幕游戏',
                files: [
                    {name: 'server/game.go - 游戏服务器', icon: '💻'},
                    {name: 'server/battle.go - 战斗逻辑', icon: '⚔️'},
                    {name: 'tech-plan.md - 技术方案', icon: '📋'}
                ]
            },
            'ad-creative': {
                name: '🎬 游戏广告',
                files: [
                    {name: 'scripts-v17.md - 买量脚本', icon: '📝'},
                    {name: 'case-analysis.md - 素材分析', icon: '📊'},
                    {name: 'creative-template.md - 创意模板', icon: '🎨'}
                ]
            },
            'art-gen': {
                name: '🎨 美术素材',
                files: [
                    {name: 'ui-mockup.md - UI设计稿', icon: '🎨'},
                    {name: 'icon-set.md - 图标集', icon: '🖼️'},
                    {name: 'style-guide.md - 风格指南', icon: '📋'}
                ]
            },
            'tech-support': {
                name: '🔧 技术支持',
                files: [
                    {name: 'trial-game/ - 试玩HTML', icon: '🎮'},
                    {name: 'battle.js - 战斗系统', icon: '⚔️'},
                    {name: 'deploy.sh - 部署脚本', icon: '🚀'}
                ]
            }
        };
        
        function showDetail(key) {
            const data = projectData[key];
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('detailPage').classList.add('active');
            document.getElementById('detailTitle').textContent = data.name + ' 的工作成果';
            document.getElementById('fileList').innerHTML = data.files.map(f => 
                '<div class="file-item"><span class="file-icon">'+f.icon+'</span><span class="file-name">'+f.name+'</span></div>'
            ).join('');
        }
        
        function goBack() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('detailPage').classList.remove('active');
        }
    </script>
</body>
</html>
