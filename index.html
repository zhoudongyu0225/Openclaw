<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 Openclaw 工作站</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #98FB98 50%, #90EE90 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        /* 顶部标题 */
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 3rem;
            color: #2c3e50;
            text-shadow: 3px 3px 0 #fff, -1px -1px 0 #fff;
            margin-bottom: 10px;
        }
        
        .date {
            background: rgba(255,255,255,0.8);
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            color: #666;
            font-weight: 600;
        }
        
        /* 游戏场景容器 */
        .game-scene {
            max-width: 1200px;
            margin: 0 auto;
            background: linear-gradient(180deg, #87CEEB 60%, #7CFC00 60%, #228B22 100%);
            border-radius: 30px;
            padding: 30px;
            min-height: 600px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        /* 云朵装饰 */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            animation: float 20s infinite linear;
        }
        
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        
        .cloud-1 { width: 100px; height: 40px; top: 30px; left: -100px; animation-delay: 0s; }
        .cloud-1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud-1::after { width: 35px; height: 35px; top: -15px; left: 45px; }
        
        .cloud-2 { width: 80px; height: 32px; top: 60px; left: -80px; animation-delay: -10s; }
        .cloud-2::before { width: 40px; height: 40px; top: -20px; left: 10px; }
        .cloud-2::after { width: 28px; height: 28px; top: -12px; left: 35px; }
        
        @keyframes float {
            from { transform: translateX(0); }
            to { transform: translateX(calc(100vw + 200px)); }
        }
        
        /* 工作台区域 */
        .workbench {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 80px;
            position: relative;
            z-index: 10;
        }
        
        /* 分身卡片 */
        .worker-card {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 4px solid #fff;
        }
        
        .worker-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .worker-card.working {
            border-color: #4CAF50;
            animation: glow 2s infinite;
        }
        
        .worker-card.idle {
            border-color: #FFB74D;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px rgba(76,175,80,0.5); }
            50% { box-shadow: 0 0 25px rgba(76,175,80,0.8); }
        }
        
        /* 分身头像 */
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            position: relative;
        }
        
        .worker-card.working .avatar {
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        /* 工作状态指示器 */
        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 3px solid #fff;
        }
        
        .status-dot.working { background: #4CAF50; }
        .status-dot.idle { background: #FFB74D; }
        
        /* 分身名称 */
        .worker-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        /* 任务描述 */
        .task {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 10px;
            min-height: 40px;
        }
        
        /* 文件夹按钮 */
        .folder-btn {
            background: linear-gradient(135deg, #FFB74D 0%, #FF9800 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .folder-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255,152,0,0.4);
        }
        
        /* 文件数量 */
        .file-count {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #999;
        }
        
        .file-count span {
            color: #4CAF50;
            font-weight: 700;
        }
        
        /* 底部统计 */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            background: rgba(255,255,255,0.9);
            padding: 15px 30px;
            border-radius: 20px;
            position: relative;
            z-index: 10;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-num {
            font-size: 1.8rem;
            font-weight: 800;
            color: #4CAF50;
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: #666;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .workbench {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 480px) {
            .workbench {
                grid-template-columns: 1fr;
            }
        }
        
        /* 装饰元素 */
        .decoration {
            position: absolute;
            font-size: 2rem;
            z-index: 5;
        }
        
        .flower-1 { bottom: 100px; left: 30px; animation: sway 3s infinite; }
        .flower-2 { bottom: 150px; right: 50px; animation: sway 3s infinite 0.5s; }
        .tree-1 { bottom: 80px; left: 150px; }
        .tree-2 { bottom: 120px; right: 150px; }
        
        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
    </style>
</head>
<body>
    <header>
        <h1>🦞 Openclaw 工作站</h1>
        <div class="date">📅 2026年3月5日 星期一</div>
    </header>
    
    <div class="game-scene">
        <!-- 装饰云朵 -->
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        
        <!-- 装饰 -->
        <div class="decoration tree-1">🌳</div>
        <div class="decoration tree-2">🌲</div>
        <div class="decoration flower-1">🌸</div>
        <div class="decoration flower-2">🌺</div>
        
        <!-- 工作台 -->
        <div class="workbench">
            <!-- 眠心诊所 -->
            <div class="worker-card working" onclick="location.href='content-ops/'">
                <div class="avatar">
                    🏥
                    <div class="status-dot working"></div>
                </div>
                <div class="worker-name">眠心诊所</div>
                <div class="task">📝 撰写公众号文章<br>更新中...</div>
                <button class="folder-btn">📁 查看文件</button>
                <div class="file-count">已产出 <span>54</span> 个文件</div>
            </div>
            
            <!-- 氢美健康 -->
            <div class="worker-card idle" onclick="location.href='ecommerce/'">
                <div class="avatar">
                    🛒
                    <div class="status-dot idle"></div>
                </div>
                <div class="worker-name">氢美健康</div>
                <div class="task">等待新任务...</div>
                <button class="folder-btn">📁 查看文件</button>
                <div class="file-count">已产出 <span>26</span> 个文件</div>
            </div>
            
            <!-- 弹幕游戏 -->
            <div class="worker-card working" onclick="location.href='game-dev/'">
                <div class="avatar">
                    🎮
                    <div class="status-dot working"></div>
                </div>
                <div class="worker-name">弹幕游戏</div>
                <div class="task">💻 开发服务器<br>更新中...</div>
                <button class="folder-btn">📁 查看文件</button>
                <div class="file-count">已产出 <span>42</span> 个文件</div>
            </div>
            
            <!-- 游戏广告 -->
            <div class="worker-card idle" onclick="location.href='ad-creative/'">
                <div class="avatar">
                    🎬
                    <div class="status-dot idle"></div>
                </div>
                <div class="worker-name">游戏广告</div>
                <div class="task">等待新任务...</div>
                <button class="folder-btn">📁 查看文件</button>
                <div class="file-count">已产出 <span>26</span> 个文件</div>
            </div>
            
            <!-- 美术素材 -->
            <div class="worker-card working" onclick="location.href='art-gen/'">
                <div class="avatar">
                    🎨
                    <div class="status-dot working"></div>
                </div>
                <div class="worker-name">美术素材</div>
                <div class="task">✨ 设计素材<br>更新中...</div>
                <button class="folder-btn">📁 查看文件</button>
                <div class="file-count">已产出 <span>13</span> 个文件</div>
            </div>
            
            <!-- 技术支持 -->
            <div class="worker-card idle" onclick="location.href='tech-support/'">
                <div class="avatar">
                    🔧
                    <div class="status-dot idle"></div>
                </div>
                <div class="worker-name">技术支持</div>
                <div class="task">等待新任务...</div>
                <button class="folder-btn">📁 查看文件</button>
                <div class="file-count">已产出 <span>8</span> 个文件</div>
            </div>
        </div>
        
        <!-- 统计栏 -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-num">3</div>
                <div class="stat-label">工作中</div>
            </div>
            <div class="stat-item">
                <div class="stat-num">3</div>
                <div class="stat-label">待命中</div>
            </div>
            <div class="stat-item">
                <div class="stat-num">169</div>
                <div class="stat-label">总文件数</div>
            </div>
            <div class="stat-item">
                <div class="stat-num">11</div>
                <div class="stat-label">版本数</div>
            </div>
        </div>
    </div>
</body>
</html>
